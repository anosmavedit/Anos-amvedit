<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anosカミ | Profile</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
            overflow:hidden;
            background:#000;
        }

        /* BACKGROUND VIDEO */
        #bg-video{
            position:fixed;
            top:50%;
            left:50%;
            min-width:100%;
            min-height:100%;
            width:auto;
            height:auto;
            transform:translate(-50%,-50%);
            object-fit:cover;
            z-index:-2;
            filter:brightness(35%);
        }

        /* DARK OVERLAY */
        .overlay{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.2);
            z-index:-1;
        }

        /* MUSIC BUTTON */
        #music-btn{
            position:fixed;
            top:20px;
            right:20px;
            background:rgba(0,195,255,0.1);
            border:1px solid rgba(0,195,255,0.3);
            color:#00c3ff;
            padding:10px 14px;
            border-radius:8px;
            cursor:pointer;
            z-index:100;
            backdrop-filter:blur(10px);
            font-size:11px;
            font-weight:bold;
            letter-spacing:1px;
            transition:0.3s;
        }

        #music-btn:hover{
            background:rgba(0,195,255,0.3);
            box-shadow:0 0 15px rgba(0,195,255,0.5);
            transform:scale(1.05);
        }

        /* CARD CONTAINER */
        .card-container{
            position:relative;
            width:100%;
            max-width:380px;
            padding:10px;
            z-index:1;
        }

        /* SCI-FI FRAME */
        .scifi-frame{
            position:absolute;
            inset:0;
            border:1px solid rgba(0,195,255,0.5);
            border-radius:20px;
            box-shadow:
                0 0 20px rgba(0,195,255,0.4),
                inset 0 0 15px rgba(0,195,255,0.2);
            pointer-events:none;
        }

        .scifi-frame span{
            position:absolute;
            width:25px;
            height:25px;
            border:3px solid #00c3ff;
            filter:drop-shadow(0 0 8px #00c3ff);
        }

        .tl{
            top:-2px;
            left:-2px;
            border-right:none;
            border-bottom:none;
            border-radius:15px 0 0 0;
        }

        .tr{
            top:-2px;
            right:-2px;
            border-left:none;
            border-bottom:none;
            border-radius:0 15px 0 0;
        }

        .bl{
            bottom:-2px;
            left:-2px;
            border-right:none;
            border-top:none;
            border-radius:0 0 0 15px;
        }

        .br{
            bottom:-2px;
            right:-2px;
            border-left:none;
            border-top:none;
            border-radius:0 0 15px 0;
        }

        /* MAIN CARD */
        .card{
            background:rgba(0,10,25,0.7);
            backdrop-filter:blur(20px);
            -webkit-backdrop-filter:blur(20px);
            border-radius:18px;
            padding:40px 30px;
            text-align:center;
        }

        /* AVATAR */
        .avatar-container{
            position:relative;
            width:110px;
            height:110px;
            margin:0 auto 20px;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .avatar{
            width:110px;
            height:110px;
            border-radius:50%;
            object-fit:cover;
            border:2px solid #00c3ff;
            box-shadow:0 0 25px rgba(0,195,255,0.6);
            z-index:2;
        }

        .neon-ring-1,
        .neon-ring-2{
            position:absolute;
            border-radius:50%;
            border:2px solid transparent;
        }

        .neon-ring-1{
            width:130px;
            height:130px;
            border-top:2px solid #00c3ff;
            border-bottom:2px solid #00c3ff;
            animation:spin 3s linear infinite;
            box-shadow:
                0 0 10px rgba(0,195,255,0.5),
                inset 0 0 10px rgba(0,195,255,0.5);
        }

        .neon-ring-2{
            width:120px;
            height:120px;
            border-left:2px solid rgba(0,195,255,0.7);
            border-right:2px solid rgba(0,195,255,0.7);
            animation:spinReverse 2s linear infinite;
        }

        @keyframes spin{
            from{ transform:rotate(0deg); }
            to{ transform:rotate(360deg); }
        }

        @keyframes spinReverse{
            from{ transform:rotate(360deg); }
            to{ transform:rotate(0deg); }
        }

        /* TEXT */
        .name{
            color:#fff;
            font-size:28px;
            font-weight:800;
            margin-bottom:10px;
            text-shadow:0 0 15px rgba(0,195,255,0.8);
            letter-spacing:1px;
        }

        .bio{
            color:rgba(255,255,255,0.85);
            font-size:12px;
            line-height:1.6;
            margin-bottom:15px;
            font-style:italic;
            padding:0 10px;
            text-shadow:0 0 5px rgba(0,195,255,0.3);
        }

        .role{
            color:#00c3ff;
            font-size:11px;
            text-transform:uppercase;
            letter-spacing:5px;
            font-weight:bold;
            margin-bottom:25px;
        }

        /* LINKS */
        .links{
            display:flex;
            flex-direction:column;
            gap:12px;
        }

        .links a{
            text-decoration:none;
            color:#fff;
            background:rgba(0,195,255,0.1);
            border:1px solid rgba(0,195,255,0.3);
            padding:14px;
            border-radius:10px;
            font-size:13px;
            font-weight:bold;
            letter-spacing:1px;
            transition:0.3s;
            text-transform:uppercase;
        }

        .links a:hover{
            background:rgba(0,195,255,0.3);
            border-color:#00c3ff;
            box-shadow:0 0 15px rgba(0,195,255,0.5);
            transform:scale(1.03);
        }
    </style>
</head>

<body>

    <!-- BACKGROUND VIDEO -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="lv_0_20241217204212_084554.mp4" type="video/mp4">
    </video>

    <!-- DARK OVERLAY -->
    <div class="overlay"></div>

    <!-- BACKGROUND MUSIC -->
    <audio id="bg-music" loop>
        <source src="two - bbno_ (tiktok version) [edit audio](360P).mp4" type="audio/mp4">
    </audio>

    <!-- MUSIC BUTTON -->
    <button id="music-btn" onclick="toggleMusic()">
        🔈 AUDIO: OFF
    </button>

    <!-- CARD -->
    <div class="card-container">

        <div class="scifi-frame">
            <span class="tl"></span>
            <span class="tr"></span>
            <span class="bl"></span>
            <span class="br"></span>
        </div>

        <div class="card">

            <div class="avatar-container">
                <div class="neon-ring-1"></div>
                <div class="neon-ring-2"></div>

                <img
                    src="https://i.postimg.cc/pXBrdS2z/v8Yw-Jb.jpg"
                    class="avatar"
                    alt="Anosカミ"
                >
            </div>

            <div class="name">Anosカミ</div>

            <div class="bio">
                The faintest ray of hope.<br>
                Only those who reach out toward even the faintest ray of hope
                will be granted a MIRACLE.<br><br>

                (discord user: anos_edits)
            </div>

            <div class="role">Editor</div>

            <div class="links">
                <a href="https://www.instagram.com/anoskami?igsh=MWVwYWhzbzluZTE3aQ==" target="_blank">
                    Instagram
                </a>

                <a href="https://www.youtube.com/@anosamvedit" target="_blank">
                    YouTube Channel
                </a>
            </div>

        </div>
    </div>

    <script>

        const music = document.getElementById("bg-music");
        const btn = document.getElementById("music-btn");

        function toggleMusic(){

            if(music.paused){

                music.play();
                btn.innerText = "🔊 AUDIO: ON";

            }else{

                music.pause();
                btn.innerText = "🔈 AUDIO: OFF";

            }
        }

    </script>

</body>
</html>
